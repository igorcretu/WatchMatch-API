services:
  api:
    build: .
    container_name: watchmatch-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # SQLite DB persists across container restarts
      - db_data:/app/data
    environment:
      DATABASE_URL: sqlite:////app/data/watchmatch.db
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY env var is required}
      # Optional: space-separated list of extra CORS origins
      EXTRA_ORIGINS: ${EXTRA_ORIGINS:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  db_data:
